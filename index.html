<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Student Grading System</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-amber-950 via-stone-900 to-amber-950 flex items-center justify-center">

<div class="w-full max-w-2xl px-4">

<div class="bg-stone-900/80 backdrop-blur-xl border border-amber-800/60 shadow-2xl rounded-2xl p-8">

<div class="mb-6 text-center">
<h1 class="text-2xl font-semibold text-amber-100">
Student Grading System
</h1>
</div>

<form id="grade-form" class="space-y-6">

<!-- Student Name -->
<div class="space-y-1">
<label class="block text-sm font-medium text-amber-200">
Student
</label>

<input
id="student-name"
type="text"
required
class="w-full rounded-lg border border-amber-700 bg-stone-900 text-amber-100 placeholder-amber-500 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500"
/>
</div>

<!-- Subject Names -->
<div id="phase1-subjects" class="grid grid-cols-1 sm:grid-cols-2 gap-4">

<div>
<label class="block text-xs font-medium text-amber-300 mb-1">
Subject 1 Name
</label>
<input id="subject1-name" type="text"
class="w-full rounded-lg border border-amber-700 bg-stone-900 text-amber-100 px-3 py-1.5 text-xs focus:ring-amber-500 focus:border-amber-500"/>
</div>

<div>
<label class="block text-xs font-medium text-amber-300 mb-1">
Subject 2 Name
</label>
<input id="subject2-name" type="text"
class="w-full rounded-lg border border-amber-700 bg-stone-900 text-amber-100 px-3 py-1.5 text-xs focus:ring-amber-500 focus:border-amber-500"/>
</div>

<div>
<label class="block text-xs font-medium text-amber-300 mb-1">
Subject 3 Name
</label>
<input id="subject3-name" type="text"
class="w-full rounded-lg border border-amber-700 bg-stone-900 text-amber-100 px-3 py-1.5 text-xs focus:ring-amber-500 focus:border-amber-500"/>
</div>

<div>
<label class="block text-xs font-medium text-amber-300 mb-1">
Subject 4 Name
</label>
<input id="subject4-name" type="text"
class="w-full rounded-lg border border-amber-700 bg-stone-900 text-amber-100 px-3 py-1.5 text-xs focus:ring-amber-500 focus:border-amber-500"/>
</div>

<div>
<label class="block text-xs font-medium text-amber-300 mb-1">
Subject 5 Name
</label>
<input id="subject5-name" type="text"
class="w-full rounded-lg border border-amber-700 bg-stone-900 text-amber-100 px-3 py-1.5 text-xs focus:ring-amber-500 focus:border-amber-500"/>
</div>

</div>

<!-- Grades -->
<div id="phase2-grades" class="hidden">

<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

<div>
<label class="block text-sm font-medium text-amber-200 mb-1">
<span id="subject1-display">Subject 1</span> - Grade (1.0-5.0)
</label>
<input id="grade1" type="number" step="0.01" min="1" max="5"
class="w-full rounded-lg border border-amber-700 bg-stone-900 text-amber-100 px-3 py-2 text-sm focus:ring-amber-500 focus:border-amber-500"/>
</div>

<div>
<label class="block text-sm font-medium text-amber-200 mb-1">
<span id="subject2-display">Subject 2</span> - Grade (1.0-5.0)
</label>
<input id="grade2" type="number" step="0.01" min="1" max="5"
class="w-full rounded-lg border border-amber-700 bg-stone-900 text-amber-100 px-3 py-2 text-sm focus:ring-amber-500 focus:border-amber-500"/>
</div>

<div>
<label class="block text-sm font-medium text-amber-200 mb-1">
<span id="subject3-display">Subject 3</span> - Grade (1.0-5.0)
</label>
<input id="grade3" type="number" step="0.01" min="1" max="5"
class="w-full rounded-lg border border-amber-700 bg-stone-900 text-amber-100 px-3 py-2 text-sm focus:ring-amber-500 focus:border-amber-500"/>
</div>

<div>
<label class="block text-sm font-medium text-amber-200 mb-1">
<span id="subject4-display">Subject 4</span> - Grade (1.0-5.0)
</label>
<input id="grade4" type="number" step="0.01" min="1" max="5"
class="w-full rounded-lg border border-amber-700 bg-stone-900 text-amber-100 px-3 py-2 text-sm focus:ring-amber-500 focus:border-amber-500"/>
</div>

<div>
<label class="block text-sm font-medium text-amber-200 mb-1">
<span id="subject5-display">Subject 5</span> - Grade (1.0-5.0)
</label>
<input id="grade5" type="number" step="0.01" min="1" max="5"
class="w-full rounded-lg border border-amber-700 bg-stone-900 text-amber-100 px-3 py-2 text-sm focus:ring-amber-500 focus:border-amber-500"/>
</div>

</div>
</div>

<!-- Buttons -->

<button type="button" id="save-subjects-button"
class="w-full rounded-lg bg-amber-600 hover:bg-amber-500 text-sm font-semibold text-white py-2.5 transition">
Save Subjects
</button>

<button type="submit" id="submit-button"
class="w-full rounded-lg bg-yellow-700 hover:bg-yellow-600 text-sm font-semibold text-white py-2.5 transition hidden">
Calculate Average
</button>

</form>

<!-- Results -->
<div id="output" class="mt-6 space-y-2">

<p id="average-display"
class="text-center text-lg font-semibold text-yellow-400 hidden"></p>

<p id="status-message"
class="text-center text-xs text-amber-300"></p>

</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./app.js" defer></script>

</body>
</html>
